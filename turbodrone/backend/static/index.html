<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC UFO Drone Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; height: 100vh; overflow: hidden; font-size: 14px; }
  .container { display: flex; height: 100vh; }
  .video-panel { flex: 4; display: flex; align-items: center; justify-content: center; background: #000; position: relative; overflow: hidden; }
  #video { width: 720px; height: 960px; object-fit: contain; image-rendering: auto; }
  .sidebar { width: 360px; background: #14141f; padding: 12px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
  h2 { color: #fff; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #2a2a3a; padding-bottom: 5px; margin-top: 3px; }
  .row { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .badge.on { background: #1a6; color: #fff; }
  .badge.off { background: #444; color: #aaa; }
  .badge.info { background: #19a; color: #fff; }
  .badge.warn { background: #e62; color: #fff; }
  button { padding: 8px 0; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.1s; }
  button:hover { filter: brightness(1.2); }
  .btn-to { background: #2a7; color: #fff; }
  .btn-ld { background: #e62; color: #fff; }
  .btn-stop { background: #c22; color: #fff; }
  .btn-hl { background: #55a; color: #fff; }
  .btn-rec { background: #c22; color: #fff; }
  .btn-rec.on { background: #a00; box-shadow: 0 0 10px rgba(200,0,0,0.5); }
  .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .jarea { display: flex; gap: 12px; justify-content: center; }
  .jbox { text-align: center; }
  .jbox .lbl { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 2px; }
  .joy { width: 120px; height: 120px; background: radial-gradient(circle, #1a1a2e 60%, #0f0f1a); border-radius: 60px; position: relative; cursor: grab; border: 2px solid #2a2a4a; user-select: none; touch-action: none; margin: 4px auto; }
  .joy:active { cursor: grabbing; }
  .knob { width: 36px; height: 36px; background: radial-gradient(circle, #6af, #38c); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 10px rgba(60,140,255,0.4); pointer-events: none; }
  .knob.t { background: radial-gradient(circle, #f84, #d52); box-shadow: 0 0 10px rgba(255,100,40,0.4); }
  .aread { font-size: 12px; font-family: monospace; color: #4af; display: flex; gap: 6px; justify-content: center; font-weight: 600; }
  .aread span { min-width: 40px; }
  .telem-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
  .telem-item { background: #0f0f1a; border-radius: 3px; padding: 4px 8px; display: flex; justify-content: space-between; font-size: 12px; }
  .telem-item .label { color: #888; }
  .telem-item .value { color: #4af; font-family: monospace; font-weight: 600; }
  .telem-item .value.green { color: #4a4; }
  .telem-item .value.red { color: #c44; }
  .procedure { background: #0a0a18; border-radius: 4px; padding: 8px 10px; font-size: 12px; line-height: 1.6; color: #ccc; border-left: 2px solid #4af; }
  .procedure b { color: #fff; }
  .procedure .key { display:inline-block; background:#2a2a4a; color:#4af; padding:1px 6px; border-radius:3px; font-family:monospace; font-size:11px; font-weight:700; }
  .procedure .danger { color: #f44; font-weight: 700; }
  .log { background: #0a0a12; border-radius: 3px; padding: 4px 8px; font-family: monospace; font-size: 11px; height: 50px; overflow-y: auto; color: #6a6; }
  .fps { position: absolute; bottom: 10px; left: 10px; font-size: 13px; color: #888; background: rgba(0,0,0,0.7); padding: 3px 10px; border-radius: 4px; }
  .drone3d-wrap { position: absolute; top: 10px; right: 10px; width: 240px; height: 120px; perspective: 500px; background: rgba(0,0,0,0.6); border-radius: 8px; border: 1px solid rgba(60,140,255,0.2); backdrop-filter: blur(3px); }
  .drone3d-scene { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transform-style: preserve-3d; }
  .drone3d { width: 60px; height: 60px; position: relative; transform-style: preserve-3d; transition: transform 0.1s ease-out; }
  .drone3d-arm { position: absolute; width: 10px; height: 48px; background: linear-gradient(180deg,#4af,#0a2a5a); border-radius: 4px; box-shadow: 0 0 6px rgba(60,140,255,0.3); }
  .drone3d-arm.tl { top: -24px; left: 3px; transform-origin: bottom center; transform: rotate(-30deg); }
  .drone3d-arm.tr { top: -24px; right: 3px; transform-origin: bottom center; transform: rotate(30deg); }
  .drone3d-arm.bl { bottom: -24px; left: 3px; transform-origin: top center; transform: rotate(30deg); }
  .drone3d-arm.br { bottom: -24px; right: 3px; transform-origin: top center; transform: rotate(-30deg); }
  .drone3d-body { width: 28px; height: 28px; background: radial-gradient(circle at 35% 35%, #4af, #0a2a5a); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 16px rgba(60,140,255,0.4), inset 0 0 8px rgba(0,0,0,0.5); border: 1px solid #4af; }
  .drone3d-prop { position: absolute; width: 16px; height: 5px; background: rgba(60,140,255,0.3); border-radius: 2px; }
  .drone3d-prop.tl { top: -27px; left: -3px; }
  .drone3d-prop.tr { top: -27px; right: -3px; }
  .drone3d-prop.bl { bottom: -27px; left: -3px; }
  .drone3d-prop.br { bottom: -27px; right: -3px; }
  .drone3d-ring { position: absolute; width: 66px; height: 66px; border: 1px solid rgba(60,140,255,0.12); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .drone3d-ring2 { position: absolute; width: 80px; height: 80px; border: 1px dashed rgba(60,140,255,0.06); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .drone3d-glow { position: absolute; width: 60px; height: 60px; background: radial-gradient(circle, rgba(60,140,255,0.08) 0%, transparent 70%); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%); }

</style>
</head>
<body>
<div class="container">
  <div class="video-panel">
    <img id="video" src="/mjpeg">
    <div class="fps"><span id="fps">0</span> fps</div>
    <div class="drone3d-wrap" style="width:240px;height:120px;">
      <div style="height:18px;font-size:10px;color:#4af;text-align:center;border-bottom:1px solid rgba(60,140,255,0.1);">
        <span id="d3d-angles">P:0° R:0° Y:0°</span>
      </div>
      <div style="display:flex;height:100px;">
        <div style="flex:1;text-align:center;border-right:1px solid rgba(60,140,255,0.08);">
          <div style="font-size:8px;color:#888;padding:1px 0;">top</div>
          <div class="drone3d-scene" style="height:80px;">
            <div class="drone3d" id="drone3d">
              <div class="drone3d-glow"></div>
              <div class="drone3d-ring"></div>
              <div class="drone3d-ring2"></div>
              <div class="drone3d-prop tl"></div>
              <div class="drone3d-prop tr"></div>
              <div class="drone3d-prop bl"></div>
              <div class="drone3d-prop br"></div>
              <div class="drone3d-arm tl"></div>
              <div class="drone3d-arm tr"></div>
              <div class="drone3d-arm bl"></div>
              <div class="drone3d-arm br"></div>
              <div class="drone3d-body"></div>
            </div>
          </div>
        </div>
        <div style="flex:1;text-align:center;">
          <div style="font-size:8px;color:#888;padding:1px 0;">back</div>
          <div class="drone3d-scene" style="height:80px;">
            <div class="drone3d" id="drone3d-side">
              <div class="drone3d-glow"></div>
              <div class="drone3d-ring"></div>
              <div class="drone3d-ring2"></div>
              <div class="drone3d-prop tl"></div>
              <div class="drone3d-prop tr"></div>
              <div class="drone3d-prop bl"></div>
              <div class="drone3d-prop br"></div>
              <div class="drone3d-arm tl"></div>
              <div class="drone3d-arm tr"></div>
              <div class="drone3d-arm bl"></div>
              <div class="drone3d-arm br"></div>
              <div class="drone3d-body"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="sidebar">
    <div class="row">
      <span id="bc-conn" class="badge off">Disconnected</span>
      <span id="bc-type" class="badge info">RC UFO</span>
      <span id="bc-var" class="badge info">-</span>
      <span id="bc-sig" class="badge warn">--dBm</span>
    </div>

    <div class="btn-group">
      <button class="btn-to" onclick="sendCmd('takeoff')">Takeoff</button>
      <button class="btn-ld" onclick="sendCmd('land')">Land</button>
      <button class="btn-stop" onclick="sendCmd('estop')">Stop</button>
      <button class="btn-hl" onclick="toggleHL()">Headless</button>
    </div>
    <div class="btn-group">
      <button class="btn-rec" id="btn-rec" onclick="toggleRec()" style="grid-column:span 2;">⏺ Record</button>
    </div>
    <div class="btn-group">
      <button class="btn-hl" onclick="setSpeed(1)" style="font-size:10px;">Slow</button>
      <button class="btn-hl" onclick="setSpeed(2)" style="font-size:10px;background:#2a7;">Normal</button>
      <button class="btn-hl" onclick="setSpeed(3)" style="font-size:10px;background:#e62;">Fast</button>
      <button class="btn-hl" id="btn-speed" style="font-size:10px;background:#444;">Speed: 2</button>
    </div>

    <div class="jarea">
      <div class="jbox">
        <div class="lbl">Throttle / Yaw</div>
        <div class="joy" id="jleft"><div class="knob t" id="kl"></div></div>
        <div class="aread"><span id="vt">T:0</span><span id="vy">Y:0</span></div>
      </div>
      <div class="jbox">
        <div class="lbl">Pitch / Roll</div>
        <div class="joy" id="jright"><div class="knob" id="kr"></div></div>
        <div class="aread"><span id="vp">P:0</span><span id="vr">R:0</span></div>
      </div>
    </div>

    <h2>Telemetry</h2>
    <div class="telem-grid" id="telem"></div>

    <h2 style="cursor:pointer;" onclick="toggleHelp()">Keys <span id="help-toggle" style="float:right;color:#4af;font-size:10px;">▼</span></h2>
    <div class="procedure" id="help-box" style="padding:8px 10px;font-size:11px;line-height:1.8;">
      <b>↑↓←→</b> Move · <b>W</b>↑<b>S</b>↓ Throttle · <b>A</b><b>D</b> Yaw<br>
      <b>T</b> Takeoff · <b>L</b> Land · <b>Z</b> Arm · <b>X</b> Stop<br>
      <b>Backspace</b> Takeoff · <b style="color:#f44">Space</b> Emergency Stop<br>
      <b>R</b> Record · <b>1</b> Slow · <b>2</b> Normal · <b>3</b> Fast
    </div>
    <h2>Log</h2>
    <div class="log" id="log">Ready<br></div>
    <div class="row" style="justify-content:space-between;">
      <span style="font-size:10px;color:#888;"><span id="flight-time">0:00</span></span>
      <span style="font-size:10px;color:#888;">Flight Time</span>
    </div>


  </div>
</div>

<script>
const WS_URL = `ws://${location.host}/ws`;
let ws = null, wsOK = false;
let axes = { throttle:0, yaw:0, pitch:0, roll:0 };

function log(m) { const e=document.getElementById('log'); e.innerHTML+=m+'<br>'; e.scrollTop=e.scrollHeight; }

function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => { wsOK=true; document.getElementById('bc-conn').className='badge on'; document.getElementById('bc-conn').textContent='Connected'; log('Connected'); };
  ws.onclose = () => { wsOK=false; document.getElementById('bc-conn').className='badge off'; document.getElementById('bc-conn').textContent='Disconnected'; setTimeout(connectWS,1000); };
}
function sendCmd(t) { if(!wsOK)return; ws.send(JSON.stringify({type:t})); log(t); }
function toggleHL() { axes.headless=!axes.headless; sendCmd('headless'); }
function sendAxes() {
  if(!wsOK) return;
  ws.send(JSON.stringify({type:'axes',mode:'abs',throttle:axes.throttle,yaw:axes.yaw,pitch:axes.pitch,roll:axes.roll}));
  document.getElementById('vt').textContent='T:'+(axes.throttle*100|0);
  document.getElementById('vy').textContent='Y:'+(axes.yaw*100|0);
  document.getElementById('vp').textContent='P:'+(axes.pitch*100|0);
  document.getElementById('vr').textContent='R:'+(axes.roll*100|0);
}

// Joystick
function jsetup(eid,kid,axX,axY,inv) {
  const el=document.getElementById(eid), kb=document.getElementById(kid);
  const R=el.offsetWidth/2-16; let act=false;
  function mv(x,y) {
    const cx=el.offsetWidth/2, cy=el.offsetHeight/2;
    let dx=x-cx, dy=y-cy, d=Math.sqrt(dx*dx+dy*dy);
    if(d>R){dx=dx/d*R;dy=dy/d*R;}
    kb.style.left=(cx+dx-16)+'px'; kb.style.top=(cy+dy-16)+'px';
    const nx=dx/R, ny=dy/R;
    axes[axX]=Math.round(nx*100)/100; axes[axY]=Math.round((inv?-ny:ny)*100)/100;
    sendAxes();
  }
  function st(e) { act=true; const p=e.type.startsWith('t')?e.touches[0]:e; const r=el.getBoundingClientRect(); mv(p.clientX-r.left,p.clientY-r.top); }
  function mv2(e) { if(!act)return; e.preventDefault(); const p=e.type.startsWith('t')?e.touches[0]:e; const r=el.getBoundingClientRect(); mv(p.clientX-r.left,p.clientY-r.top); }
  function en() { if(!act)return; act=false; kb.style.left=(el.offsetWidth/2-16)+'px'; kb.style.top=(el.offsetHeight/2-16)+'px'; axes[axX]=0; axes[axY]=0; sendAxes(); }
  el.addEventListener('mousedown',st); document.addEventListener('mousemove',mv2); document.addEventListener('mouseup',en);
  el.addEventListener('touchstart',st,{passive:true}); document.addEventListener('touchmove',mv2,{passive:false}); document.addEventListener('touchend',en);
}
jsetup('jleft','kl','yaw','throttle',true);
jsetup('jright','kr','roll','pitch',true);

// Keyboard
const KBM={'w':['throttle',1],'s':['throttle',-1],'a':['yaw',-1],'d':['yaw',1],'ArrowUp':['pitch',1],'ArrowDown':['pitch',-1],'ArrowLeft':['roll',-1],'ArrowRight':['roll',1]};
let kbA={};
document.addEventListener('keydown',e=>{
  if(e.repeat)return;
  if(e.key===' '){e.preventDefault();sendCmd('estop');return;}
  if(e.key==='Backspace'){sendCmd('takeoff');return;}
  if(e.key==='t'){sendCmd('takeoff');return;}
  if(e.key==='l'){sendCmd('land');return;}
  if(e.key==='z'){sendCmd('takeoff');return;}
  if(e.key==='x'){sendCmd('estop');return;}
  if(e.key==='r'){e.preventDefault();toggleRec();return;}
  if(e.key in KBM){e.preventDefault();kbA[e.key]=true;axes[KBM[e.key][0]]=KBM[e.key][1];sendAxes();}
});
document.addEventListener('keyup',e=>{
  if(e.key in KBM&&kbA[e.key]){e.preventDefault();delete kbA[e.key];axes[KBM[e.key][0]]=0;sendAxes();}
});

// Telemetry polling - shows EVERYTHING
const TELEM_EL = document.getElementById('telem');
function renderTelem(key, val, extra) {
  if (typeof val === 'boolean') val = val ? 'ON' : 'OFF';
  else if (typeof val === 'number') val = val.toFixed(2);
  const cls = extra === 'sig' ? ('value ' + (parseInt(val) > -60 ? 'green' : parseInt(val) > -70 ? '' : 'red')) : 'value';
  return '<div class="telem-item"><span class="label">'+key+'</span><span class="'+cls+'">'+val+'</span></div>';
}
async function pollTelemetry() {
  try {
    const r=await fetch('/status');
    const d=await r.json();
    document.getElementById('bc-sig').textContent=d.wifi.signal||'--';
    const sv=parseInt(d.wifi.signal);
    document.getElementById('bc-sig').className='badge '+(sv>-60?'on':sv>-70?'info':'warn');

    let html = '';
    // WiFi
    html += renderTelem('SSID', d.wifi.ssid||'--');
    html += renderTelem('Signal', d.wifi.signal||'--', 'sig');
    html += renderTelem('Quality', d.wifi.quality||'--');
    // RX
    if(d.rx) {
      html += renderTelem('Variant', d.rx.variant||'--');
      html += renderTelem('ResID', d.rx.resolution_id??'--');
      html += renderTelem('RX Packet', d.rx.last_packet||'--');
    }
    // Drone type
    html += renderTelem('Drone', d.drone_type||'--');
    // All model telemetry
    if(d.telemetry) {
      for(const [k,v] of Object.entries(d.telemetry)) {
        html += renderTelem(k.replace(/_/g,' '), v);
      }
    }
    TELEM_EL.innerHTML = html;
  } catch(_) {}
}
setInterval(pollTelemetry,400);

// Frame counter
let fc=0;
setInterval(()=>{document.getElementById('fps').textContent=fc;fc=0;},1000);
document.getElementById('video').addEventListener('load',()=>fc++);

// 3D drone animation (top + side views)
const droneEl = document.getElementById('drone3d');
const droneSide = document.getElementById('drone3d-side');
const d3dAngles = document.getElementById('d3d-angles');
let dPitch=0, dRoll=0, dYaw=0;
function update3DDrone() {
  const p = dPitch * 0.5;
  const r = dRoll * 0.5;
  const y = dYaw * 0.3;
  droneEl.style.transform = `rotateX(${p}deg) rotateZ(${r}deg) rotateY(${y}deg)`;
  droneSide.style.transform = `rotateY(180deg) rotateZ(${r}deg) rotateX(${-p}deg)`;
  d3dAngles.textContent = `P:${dPitch.toFixed(1)}° R:${dRoll.toFixed(1)}° Y:${dYaw.toFixed(1)}°`;
}
// Override telemetry polling to capture pitch/roll/yaw
const origPoll = pollTelemetry;
pollTelemetry = async function() {
  try {
    const r=await fetch('/status');
    const d=await r.json();
    document.getElementById('bc-sig').textContent=d.wifi.signal||'--';
    const sv=parseInt(d.wifi.signal);
    document.getElementById('bc-sig').className='badge '+(sv>-60?'on':sv>-70?'info':'warn');
    let html = '';
    html += renderTelem('SSID', d.wifi.ssid||'--');
    html += renderTelem('Signal', d.wifi.signal||'--', 'sig');
    html += renderTelem('Quality', d.wifi.quality||'--');
    if(d.rx) {
      html += renderTelem('Variant', d.rx.variant||'--');
      html += renderTelem('ResID', d.rx.resolution_id??'--');
      html += renderTelem('RX Packet', d.rx.last_packet||'--');
    }
    html += renderTelem('Drone', d.drone_type||'--');
    if(d.telemetry) {
      for(const [k,v] of Object.entries(d.telemetry)) {
        html += renderTelem(k.replace(/_/g,' '), v);
      }
      // Extract angles for 3D drone
      if(d.telemetry.pitch !== undefined) dPitch = (128 - d.telemetry.pitch) / 1.28;
      if(d.telemetry.roll !== undefined) dRoll = (128 - d.telemetry.roll) / 1.28;
      if(d.telemetry.yaw !== undefined) dYaw = (128 - d.telemetry.yaw) / 1.28;
      update3DDrone();
    }
    TELEM_EL.innerHTML = html;
  } catch(_) {}
};
setInterval(pollTelemetry,400);

// Speed control (3 levels)
let currentSpeed = 2;
function setSpeed(level) {
  currentSpeed = level;
  document.getElementById('btn-speed').textContent = 'Speed: ' + level;
  if (!wsOK) return;
  ws.send(JSON.stringify({type:'set_speed_index', speed_index: level}));
  log('Speed: ' + ['','Slow','Normal','Fast'][level]);
}

// Toggle recording
let recording = false;
async function toggleRec() {
  const btn = document.getElementById('btn-rec');
  try {
    const r = await fetch('/record', {method:'POST'});
    const d = await r.json();
    if (d.status === 'recording') {
      recording = true;
      btn.textContent = '⏹ Stop Recording';
      btn.className = 'btn-rec on';
      log('Recording to ' + d.path);
    } else {
      recording = false;
      btn.textContent = '⏺ Record';
      btn.className = 'btn-rec';
      log('Recording stopped');
    }
  } catch(e) { log('Record error'); }
}

function toggleHelp() {
  const b=document.getElementById('help-box'), t=document.getElementById('help-toggle');
  if(b.style.display==='none'){b.style.display='block';t.textContent='▼';}
  else{b.style.display='none';t.textContent='▶';}
}
connectWS();
log('Dashboard ready');
</script>
</body>
</html>
